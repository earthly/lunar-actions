name: Sync Lunar manifest (deprecated)
description: |
  DEPRECATED — use earthly/lunar-actions/sync-config@main instead.
  This action is kept as an alias so existing pinned references keep working.
author: Earthly Technologies
inputs:
  manifest-url:
    description: >
      Lunar config repo URL, in the form of: github://<org>/<repo>@<branch>
    required: true
  hub-token:
    required: true
  lunar-version:
    description: >
      Lunar version (vx.y.z), as one of the tags available at https://github.com/earthly/lunar-dist/tags
    required: true
  hub-host:
    required: true
  hub-grpc-port:
    default: "443"
    required: false
  hub-http-port:
    default: "443"
    required: false
  rerun-code-collectors:
    description: >
      Rerun affected code collectors after pulling the manifest. Default: false.
    default: "false"
    required: false
  include-pr-commits:
    description: >
      Include PR commits when rerunning code collectors. Only used when rerun-code-collectors is true.
    default: "false"
    required: false
  pr-max-age-days:
    description: >
      Ignore PR commits older than this max (days). Only used when rerun-code-collectors is true.
    default: "5"
    required: false
  rerun-catalogers:
    description: >
      Rerun global catalogers after pulling the manifest. Default: false.
      Requires lunar v1.1.2 or newer.
    default: "false"
    required: false
  log-level:
    description: >
      Lunar log level.
    default: debug
    required: false

runs:
  using: "composite"
  steps:
    - name: Deprecation notice
      run: |
        echo "::warning title=lunar-actions/sync-manifest is deprecated::Use earthly/lunar-actions/sync-config@main. The sync-manifest action is kept as an alias and will be removed in a future release."
      shell: bash

    - name: Download Lunar binary
      env:
        FORCE_COLOR: 1
      run: |
        curl -L https://github.com/earthly/lunar-dist/releases/download/${{ inputs.lunar-version }}/lunar-linux-amd64 -o /usr/local/bin/lunar
        chmod +x /usr/local/bin/lunar
        echo "Lunar ${{ inputs.lunar-version }} installed"
      shell: bash

    - name: Pull manifest
      env:
        FORCE_COLOR: 1
        LUNAR_HUB_TOKEN: ${{ inputs.hub-token }}
        LUNAR_HUB_HOST: ${{ inputs.hub-host }}
        LUNAR_HUB_GRPC_PORT: ${{ inputs.hub-grpc-port }}
        LUNAR_HUB_HTTP_PORT: ${{ inputs.hub-http-port }}
        LUNAR_LOG_LEVEL: ${{ inputs.log-level }}
      run: |
        ARGS=()
        if [ "${{ inputs.rerun-code-collectors }}" = "true" ]; then
          ARGS+=("--rerun-code-collectors")
          if [ "${{ inputs.include-pr-commits }}" = "true" ]; then
            ARGS+=("--include-pr-commits")
          fi
          ARGS+=("--pr-max-age-days" "${{ inputs.pr-max-age-days }}")
        fi
        if [ "${{ inputs.rerun-catalogers }}" = "true" ]; then
          ARGS+=("--rerun-catalogers")
        fi
        lunar hub pull "${ARGS[@]}" "${{ inputs.manifest-url }}"
      shell: bash
